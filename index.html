<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎉</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: #fff;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff; }
            to { text-shadow: 0 0 30px #ff0; }
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #ff4081;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #e91e63;
        }

        .hidden {
            display: none;
        }

        .message {
            margin-top: 30px;
            font-size: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎂 Happy Birthday! 🎉</h1>
    <p>Click the button for a surprise 🎁</p>

    <button onclick="showMessage()">Show Message</button>

    <div id="msg" class="message hidden">
        🎈 Wishing you a day filled with love, joy, and happiness! 🎈
    </div>
</div>

<script>
    function showMessage() {
        document.getElementById("msg").classList.remove("hidden");
    }
</script>

</body>
</html>
